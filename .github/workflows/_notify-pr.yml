name: Notify Telegram on PR (reusable)

on:
  workflow_call:
    secrets:
      NOTIFY_BOT_TOKEN:
        required: false
      NOTIFY_CHAT_ID:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
          REPO: ${{ github.repository }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          URL: ${{ github.event.pull_request.html_url }}
          SENDER: ${{ github.event.sender.login }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "No secrets — skipping"
            exit 0
          fi

          esc() { echo "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          name_of() {
            case "$1" in
              rilhoms) echo "Ильхом" ;;
              Vadim-DV555) echo "Вадим" ;;
              RuslanRiarra) echo "Руслан" ;;
              *) echo "$1" ;;
            esac
          }

          NAME=$(name_of "$SENDER")
          SAFE_TITLE=$(esc "$TITLE")
          SAFE_BASE=$(esc "$BASE_REF")
          SAFE_HEAD=$(esc "$HEAD_REF")

          case "$ACTION" in
            opened) EMOJI="🔀" ; HEAD="Новый PR" ; DETAIL="Открыл: ${NAME}" ;;
            closed)
              if [ "$MERGED" = "true" ]; then
                EMOJI="🎉" ; HEAD="PR смёржен" ; DETAIL="Смёржил: ${NAME}"
              else
                EMOJI="❌" ; HEAD="PR закрыт без мержа" ; DETAIL="Закрыл: ${NAME}"
              fi ;;
            reopened) EMOJI="🔄" ; HEAD="PR переоткрыт" ; DETAIL="Переоткрыл: ${NAME}" ;;
            ready_for_review) EMOJI="👀" ; HEAD="PR готов к ревью" ; DETAIL="Готов: ${NAME}" ;;
            *) exit 0 ;;
          esac

          MSG=$(printf "%s <b>%s</b>\n\n#%s %s\n<code>%s</code> → <code>%s</code>\n%s\n📦 %s\n\n<a href=\"%s\">открыть</a>" \
            "$EMOJI" "$HEAD" "$NUM" "$SAFE_TITLE" "$SAFE_HEAD" "$SAFE_BASE" "$DETAIL" "$REPO" "$URL")

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MSG}"
