name: Notify Telegram on Push (reusable)

on:
  workflow_call:
    secrets:
      NOTIFY_BOT_TOKEN:
        required: false
      NOTIFY_CHAT_ID:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          SENDER: ${{ github.event.head_commit.author.username }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "No NOTIFY_BOT_TOKEN / NOTIFY_CHAT_ID — skipping"
            exit 0
          fi

          SHA_SHORT="${SHA:0:7}"

          case "$SENDER" in
            rilhoms) NAME="Ильхом" ;;
            Vadim-DV555) NAME="Вадим" ;;
            RuslanRiarra) NAME="Руслан" ;;
            *) NAME="$SENDER" ;;
          esac

          SUBJECT=$(echo "$COMMIT_MSG" | head -1 | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')

          MSG=$(printf "📦 <b>Новый коммит в %s</b>\n<i>%s</i>\n\n<code>%s</code> %s\n\n<a href=\"%s\">открыть на GitHub</a>" \
            "$REPO" "$NAME" "$SHA_SHORT" "$SUBJECT" "$COMMIT_URL")

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${MSG}"
